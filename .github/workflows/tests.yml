#  For more information about TARDIS pipelines, please refer to:
#
#    https://tardis-sn.github.io/tardis/development/continuous_integration.html

name: tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize

  workflow_call:
    inputs:
      pip_git:
        description: "Whether or not to install tardis using git"
        required: false
        type: boolean
        default: false

env:
  CACHE_NUMBER: 0  # increase to reset cache manually
  PYTEST_FLAGS: --tardis-regression-data=${{ github.workspace }}/tardis-regression-data --cov=tardis --cov-report=xml --cov-report=html --cov-append
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

defaults:
  run:
    shell: bash -l {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # test-cache:
  #   uses: ./.github/workflows/lfs-cache.yml
  #   with:
  #     atom-data-sparse: false
  #     regression-data-repo: tardis-sn/tardis-regression-data
  #     allow_lfs_pull: ${{ github.ref == 'refs/heads/master' || contains(github.event.pull_request.labels.*.name, 'git-lfs-pull') }}

  tests:
    name: ${{ matrix.continuum }} continuum ${{ matrix.os }} ${{ matrix.library }} ${{ inputs.pip_git && 'pip tests enabled' || '' }}
    if: github.repository_owner == 'tardis-sn'
    # needs: [test-cache]
    # runs-on: ${{ matrix.os }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        label: [osx-arm64]
        continuum: ['not']
        library: [
          # # Core scientific libraries
          # 'numpy=2.0.2', 
          # 'scipy=1.13.1', 
          # 'pandas=2.2.2', 
          # 'astropy=6.1.1', 
          # 'matplotlib-base=3.8.4', 
          # 'numba=0.60.0', 
          # 'h5py=3.11.0',
          # 'networkx=3.3',
          
          # # Data handling
          # 'pytables=3.10.2',
          
          # # Visualization and interactive tools  
          # 'plotly=5.22.0',
          # 'qgrid=1.3.1',
          
          # # Domain specific
          # 'radioactivedecay=0.5.1',
          # 'sympy=1.12.1',
          
          # # Additional important libraries
          # 'pyerfa=2.0.1.4',         # Essential routines for fundamental astronomy
          # 'numexpr=2.10.0',         # Fast numerical expression evaluator
          # 'mpmath=1.3.0',           # Arbitrary precision arithmetic
          # 'gmpy2=2.1.5',            # Multiple-precision arithmetic
          # 'pillow=10.3.0',          # Image processing
          # 'ipython=8.25.0',         # Interactive computing
          # 'ipywidgets=7.8.0',       # Interactive widgets
          # 'pytest=8.2.2',           # Testing framework
          # 'coverage=7.5.3',         # Code coverage
          # 'lxml=5.2.2',             # XML processing 
          # 'pyyaml=6.0.1',           # YAML parser
          # 'requests=2.32.3',        # HTTP library
          # 'snappy=1.2.1',           # Compression library
          # 'typing_extensions=4.12.2', # Type hints
          # 'tqdm=4.66.4',            # Progress bars
          # 'snakeviz=2.2.0',         # Performance profiling
          # 'tabulate=0.9.0',         # Pretty-print tabular data
          # 'jupyterlab=4.2.2',       # Interactive development environment
          # 'nbformat=5.10.4',        # Notebook format
          # 'zstandard=0.23.0',       # Fast compression algorithm
          
          # # Additional 10 libraries
          # 'sphinx=7.3.7',           # Documentation generator
          # 'pygraphviz=1.13',        # Graph visualization
          # 'beautifulsoup4=4.12.3',  # HTML/XML parser
          # 'jinja2=3.1.4',           # Template engine
          # 'jsonschema=4.22.0',      # JSON schema validation
          # 'graphviz=11.0.0',        # Graph visualization software
          # 'psutil=5.9.8',           # Process and system utilities
          # 'tornado=6.4.1',          # Web framework and asynchronous library
          # 'setuptools-scm=8.1.0',   # Package versioning from SCM
          # 'py-cpuinfo=9.0.0'        # CPU information and benchmarking
          'cloudpickle=2.2.1',      # Serialization library extended from pickle
          'dill=0.3.8',             # Alternative serialization library  
          'llvmlite=0.43.0',        # LLVM bindings for Python (Numba dependency)
          'setuptools=70.0.0',      # Package installation and distribution tools
          'python=3.11.8',          # Try earlier Python version than 3.12.4
          'importlib-metadata=7.1.0', # Metadata for installed packages
          'joblib=1.3.2',           # Pipelining and parallelization tools
          'blosc=1.21.6',           # High-performance compressor
          'numba=0.59.0',           # Try earlier Numba version
          'attrs=23.2.0'     
        ]
        include:
          - label: osx-arm64
            os: macos-latest
            prefix: /Users/runner/miniconda3/envs/tardis

          # - label: linux-64
          #   os: ubuntu-latest
          #   prefix: /usr/share/miniconda3/envs/tardis
    steps:
      - uses: actions/checkout@v4

      - name: Setup LFS
        uses: ./.github/actions/setup_lfs

      - name: Setup environment
        uses: ./.github/actions/setup_env
        with:
          os-label: ${{ matrix.label }}
          
      - name: Install specific version of ${{ matrix.library }}
        run: |
          # Extract library name and version from matrix value
          LIB_NAME=$(echo "${{ matrix.library }}" | cut -d'=' -f1)
          LIB_VERSION=$(echo "${{ matrix.library }}" | cut -d'=' -f2)
          
          # Uninstall current version if it exists
          # conda remove --force $LIB_NAME --yes || true
          
          # Install the specific version
          micromamba install -c conda-forge $LIB_NAME=$LIB_VERSION  python --yes
          
          # Show installed version for confirmation
          python -c "import $LIB_NAME; print(f'$LIB_NAME version: {$LIB_NAME.__version__}')" || echo "Version check not applicable for this library"

      - name: Install package editable
        if: ${{ !inputs.pip_git }}
        run: |
          pip install -e . --user

      - name: Install package git
        if: ${{ inputs.pip_git }}
        run: |
          pip install git+https://github.com/tardis-sn/tardis.git@master

      - name: Install qgridnext
        if: ${{ !inputs.pip_git }}
        run: |
          pip install qgridnext

      - name: Run tests
        run: pytest tardis tardis/transport/montecarlo/tests/test_rpacket_tracker.py ${{ env.PYTEST_FLAGS }} -m "${{ matrix.continuum }} continuum"
        env:
          PYTHONFAULTHANDLER: 1 # sefgault
        #   PYTHONDEVMODE: 1  # Enable additional runtime checks and warnings
        #   PYTHONASYNCIODEBUG: 1  # Show asyncio debug info
        #   PYTHONTRACEMALLOC: 5  # Enable tracemalloc with 5 frames
        #   PYTHONWARNINGS: "always"  # Show all warnings
        #   PYTHONUNBUFFERED: 1  # Immediately show output without buffering

      - name: Regression Data Generation tests
        run: pytest tardis/transport/montecarlo/tests/test_rpacket_tracker.py ${{ env.PYTEST_FLAGS }} --generate-reference -m "${{ matrix.continuum }} continuum"
        if: contains(github.event.pull_request.labels.*.name, 'run-generation-tests') || github.ref == 'refs/heads/master'

      - run: mv .coverage .coverage.${{ strategy.job-index }}

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.continuum }}-continuum-${{ matrix.os }}-${{ matrix.library }}
          include-hidden-files: true
          path: |
            .coverage*
            !.coveragerc

  combine_coverage_reports:
    needs: [tests]
    if: github.repository_owner == 'tardis-sn'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/setup_env
        with:
          os-label: linux-64

      # will download all artifacts(in this case all are coverage reports)
      - uses: actions/download-artifact@v4
        with:
          path: .
          merge-multiple: true

      - name: Combine coverage reports
        run: |
          coverage combine
          coverage xml
          coverage html

      - name: Print report
        run: coverage report

      - uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true