name: publish-benchmark-comparison

on:
  workflow_run:
    workflows: [benchmarks]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.repository.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      DEPLOY_BRANCH: main
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
      PR_SHA: ${{ github.event.workflow_run.head_sha }}
      RUN_ID: ${{ github.event.workflow_run.id }}
    steps:
      - name: Download benchmark artifacts
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          repository: ${{ github.repository }}
          name: asv-benchmark-results-${{ env.PR_SHA }}
          path: comparison-artifacts

      - name: Check for generated benchmark HTML
        id: html
        run: |
          if [ -d comparison-artifacts/.asv/html ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read benchmark output
        if: steps.html.outputs.enabled == 'true'
        id: asv_pr_vs_master
        uses: juliangruber/read-file-action@v1.1.8
        with:
          path: comparison-artifacts/asv-compare-output.log

      - name: Read changed benchmark output
        if: steps.html.outputs.enabled == 'true'
        id: asv_pr_vs_master_changed
        uses: juliangruber/read-file-action@v1.1.8
        with:
          path: comparison-artifacts/asv-compare-changed-output.log

      - name: Deploy benchmark page
        if: steps.html.outputs.enabled == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.BOT_TOKEN }}
          publish_branch: ${{ env.DEPLOY_BRANCH }}
          publish_dir: comparison-artifacts/.asv/html
          destination_dir: pull/${{ env.PR_NUMBER }}
          keep_files: true
          force_orphan: false
          external_repository: tardis-sn/tardis-benchmarks
          user_name: "TARDIS Bot"
          user_email: "tardis.sn.bot@gmail.com"
          full_commit_message: |
            deploy: PR #${{ env.PR_NUMBER }}

            This is an automated benchmark deploy.
            Triggered by: pull_request (#${{ env.PR_NUMBER }})
            PR: https://github.com/${{ github.repository }}/pull/${{ env.PR_NUMBER }}
            PR head commit: https://github.com/${{ github.repository }}/commit/${{ env.PR_SHA }}
            Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ env.RUN_ID }}

      - name: Find comment
        if: steps.html.outputs.enabled == 'true'
        uses: peter-evans/find-comment@v4
        id: fc
        with:
          issue-number: ${{ env.PR_NUMBER }}
          body-includes: I ran benchmarks as you asked

      - name: Post comment
        if: steps.html.outputs.enabled == 'true'
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.BOT_TOKEN }}
          issue-number: ${{ env.PR_NUMBER }}
          comment-id: ${{ steps.fc.outputs.comment-id }}
          edit-mode: replace
          body: |
            *\*beep\* \*bop\**
            Hi human,
            I ran benchmarks as you asked comparing master and the latest commit (${{ env.PR_SHA }}).
            Here are the logs produced by ASV.
            Results can also be downloaded as artifacts [**here**](https://github.com/${{ github.repository }}/actions/runs/${{ env.RUN_ID }}?check_suite_focus=true).

            Significantly changed benchmarks:
            <details>

              ```diff
              ${{ steps.asv_pr_vs_master_changed.outputs.content }}
              ```

            </details>

            All benchmarks:
            <details>

              ```diff
              ${{ steps.asv_pr_vs_master.outputs.content }}
              ```

            </details>

            If you want to see the graph of the results, you can check it [**here**](https://tardis-sn.github.io/tardis-benchmarks/pull/${{ env.PR_NUMBER }})
