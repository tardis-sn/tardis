name: publish-mailmap
run-name: publish mailmap result · ${{ github.event.workflow_run.display_title }}

on:
  workflow_run:
    workflows: [mailmap]
    types: [completed]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  comment-on-failure:
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.repository.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Get PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_OWNER: ${{ github.event.workflow_run.head_repository.owner.login }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          pr_number=$(gh api --method GET "repos/${GITHUB_REPOSITORY}/pulls" -f state=open \
            -f "head=${HEAD_OWNER}:${HEAD_BRANCH}" \
            --jq ".[] | select(.head.sha == \"${HEAD_SHA}\") | .number")
          if [[ ! "${pr_number}" =~ ^[0-9]+$ ]]; then
            echo "::error::No unique open pull request matches this source run."
            exit 1
          fi
          echo "number=${pr_number}" >> "${GITHUB_OUTPUT}"

      - name: Create comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.BOT_TOKEN }}
          issue-number: ${{ steps.pr.outputs.number }}
          body: |
            *\*beep\* \*bop\**

            Hi, human.

            I'm the @tardis-bot and couldn't find your records in my database. I think we don't know each other, or you changed your credentials recently.

            Please add your **name** and **email** to `.mailmap` in your current branch and push the changes to this pull request.

            In case you need to map an existing alias, follow [this example](https://docs.enterprise.codescene.io/versions/2.0.0/getting-started/ensure-you-use-a-mailmap.html).

            Runs: [mailmap check](${{ github.event.workflow_run.html_url }}) · [comment publisher](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
