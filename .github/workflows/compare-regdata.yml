#  For more information about TARDIS pipelines, please refer to:
#
#    https://tardis-sn.github.io/tardis/development/continuous_integration.html

name: compare-regdata

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize
      - labeled

  workflow_call:

env:
  CACHE_NUMBER: 0  # increase to reset cache manually
  PYTEST_FLAGS: --tardis-regression-data=${{ github.workspace }}/tardis-regression-data --cov=tardis --cov-report=xml --cov-report=html --cov-append

defaults:
  run:
    shell: bash -l {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test-cache:
    uses: ./.github/workflows/lfs-cache.yml
    if: contains(github.event.pull_request.labels.*.name, 'run-regression-comparison')
    with:
      atom-data-sparse: false
      regression-data-repo: tardis-sn/tardis-regression-data

  tests:
    name: compare-regdata ${{ matrix.os }}
    if: (github.repository_owner == 'tardis-sn') && contains(github.event.pull_request.labels.*.name, 'run-regression-comparison')
    needs: [test-cache]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        label: [osx-arm64, linux-64]
        include:
          - label: osx-arm64
            os: macos-latest
            prefix: /Users/runner/miniconda3/envs/tardis

          - label: linux-64
            os: ubuntu-latest
            prefix: /usr/share/miniconda3/envs/tardis
    steps:
      - name: Free Disk Space (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: false
          
          # other packages
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Free up disk space on macOS
        if: matrix.os == 'macos-latest'
        run: |
          echo "Initial disk usage:"
          df -h
          
          # Remove unnecessary Xcode versions (if any)
          if ls /Applications/Xcode_*.app 1> /dev/null 2>&1; then
            echo "Removing old Xcode versions..."
            sudo rm -rf /Applications/Xcode_*.app
          else
            echo "No additional Xcode versions found"
          fi
          
          # Clean Homebrew cache
          echo "Cleaning Homebrew cache..."
          brew cleanup --prune=all || true
          
          # Remove iOS simulators (only if simctl is available)
          if command -v xcrun simctl &> /dev/null; then
            echo "Cleaning iOS simulators..."
            xcrun simctl delete unavailable || true
          else
            echo "simctl not available, skipping iOS simulator cleanup"
          fi
          
          # Clear system caches (be more selective)
          echo "Clearing system caches..."
          rm -rf ~/Library/Caches/* 2>/dev/null || true
          
          # Optional: Remove other large files
          # sudo rm -rf /usr/local/lib/android 2>/dev/null || true
          # sudo rm -rf /usr/local/share/dotnet 2>/dev/null || true
          
          echo "Final disk usage:"
          df -h

      - name: Checkout pull request
        uses: actions/checkout@v6
      
      - name: Checkout tardisbase repository
        uses: actions/checkout@v6
        with:
          repository: tardis-sn/tardisbase
          path: tardisbase

      - name: Setup LFS
        uses: ./.github/actions/setup_lfs

      - name: Setup environment
        uses: tardis-sn/tardis-actions/setup-env@main
        with:
          os-label: ${{ matrix.label }}
          lockfile-path: ./conda-${{ matrix.label }}.lock

      - name: Install tardis editable
        run: |
          pip install -e .
      
      - name: Install tardisbase editable
        run: pip install -e .
        working-directory: tardisbase

      - name: Install lineid_plot
        run: |
          pip install --no-deps lineid_plot

      # installation doesnt work with no-deps
      - name: Install GitPython
        run: |
          pip install GitPython

      - name: Regression Data Generation tests
        run: pytest tardis ${{ env.PYTEST_FLAGS }} --generate-reference
      
      - name: Commit regression data
        id: commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tardis
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Update regression data for commit ${GITHUB_SHA}"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
        working-directory: ${{ github.workspace }}/tardis-regression-data

      - name: Add environment variable to save plots
        run: |
          echo "SAVE_COMP_IMG=1" >> $GITHUB_ENV
      
      - name: Install Kaleido
        if: steps.commit.outputs.has_changes == 'true'
        run: |
          pip install --no-deps kaleido==0.2.1

      - name: Run comparison notebook
        if: steps.commit.outputs.has_changes == 'true'
        run: |
          jupyter nbconvert --execute ${{ github.workspace }}/tardisbase/tardisbase/testing/regression_comparison/compare_regression_data.ipynb \
            --to html \
            --output=compare_regression_data_${{ github.event.pull_request.head.sha || github.sha }}_${{ matrix.os }}.html \
        working-directory: ${{ github.workspace }}/tardis-regression-data
        env:
          REGRESSION_DATA_REPO: ${{ github.workspace }}/tardis-regression-data
  
      - name: Upload comparison notebook
        if: steps.commit.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: compare_regression_data_${{ github.event.pull_request.head.sha || github.sha }}_${{ matrix.os }}.html
          include-hidden-files: true
          path: |
            ${{ github.workspace }}/tardisbase/tardisbase/testing/regression_comparison/compare_regression_data_${{ github.event.pull_request.head.sha || github.sha }}_${{ matrix.os }}.html
            ${{ github.workspace }}/tardisbase/tardisbase/testing/regression_comparison/comparison_plots*
