name: orcid-check

on:
  pull_request:
    branches: [master]

jobs:
  check-orcid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Check if author email exists in orcid.csv
        id: check_orcid
        continue-on-error: true
        run: |
          echo "PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}"
          grep "$(git log $PR_BASE_SHA..HEAD --pretty='%aE' | sort -u)" .orcid.csv
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}

      - name: Save ORCID check result
        if: always()
        run: |
          if [[ "${{ steps.check_orcid.outcome }}" == failure ]]; then
            echo failure > orcid-status.txt
          else
            echo success > orcid-status.txt
          fi

      - name: Upload ORCID check result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: orcid-results-${{ github.event.pull_request.head.sha }}
          path: orcid-status.txt
