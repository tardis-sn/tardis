name: codespell

on:
  push:
    branches:
      - master
  workflow_dispatch:
  pull_request:
    branches:
      - master

defaults:
  run:
    shell: bash -l {0}

jobs:
  codespell:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        if: github.event_name != 'pull_request'

      - name: Checkout pull/${{ github.event.number }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
        if: github.event_name == 'pull_request'

      - name: Run codespell
        uses: codespell-project/actions-codespell@v2
        with:
          path: docs
