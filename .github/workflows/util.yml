name: utility

on:
  pull_request_target:
    branches:
      - master

jobs:
  add-gsoc-label:
    if: contains(github.event.pull_request.title, 'GSoC')
    runs-on: ubuntu-latest
    steps:
      - name: Add GSoC label
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.BOT_TOKEN }}
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['GSoC :sun_with_face:']
            });

  check-first-time-committer:
    if: >
      github.event.action == 'opened' &&
      contains(fromJSON('["FIRST_TIMER", "FIRST_TIME_CONTRIBUTOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read

    steps:
      - name: Welcome first-time contributor
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- tardis:first-time-contributor-welcome -->';
            const issue_number = context.payload.pull_request.number;
            const login = context.payload.pull_request.user.login;
            const body = [
              marker,
              `👋 Welcome @${login}! Thank you for your first contribution to this repository!`,
              '',
              '**If you are applying to GSoC, please read our [AI Usage Policy](https://tardis-sn.github.io/summer_of_code/ai_usage_policy/) and our [PR checklist](https://tardis-sn.github.io/summer_of_code/pr_checklist/).**',
              '',
              'Please mark the pull request as draft if you are not ready for review yet or if there are things you will be adding.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existingComment = comments.find((comment) => comment.body?.includes(marker));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

  check-orcid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Check if author email exists in orcid.csv
        id: check_orcid
        continue-on-error: true
        run: |
          echo "PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}"
          grep "$(git log $PR_BASE_SHA..HEAD --pretty='%aE' | sort -u)" .orcid.csv
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}

      - name: Find comment
        uses: peter-evans/find-comment@v4
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: Please add your email and ORCID ID
        if: always()

      - name: Create comment
        if: steps.check_orcid.outcome == 'failure'
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.BOT_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.fc.outputs.comment-id }}
          edit-mode: replace
          body: |
            *\*beep\* \*bop\**

            Hi, human.

            I'm the @tardis-bot and I noticed that your email is not associated with an ORCID ID in our database.

            Please add your email and ORCID ID to the `.orcid.csv` file in your current branch and push the changes to this pull request.

            If you don't have an ORCID ID yet, you can create one for free at [orcid.org](https://orcid.org/). ORCID IDs help ensure you get proper credit for your scientific contributions.

            The format should be:
            ```
            email,orcid
            your.email@example.com,0000-0000-0000-0000
            ```
