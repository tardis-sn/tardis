name: utility

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize, labeled, unlabeled, ready_for_review]
    branches:
      - master

jobs:
  git-lfs-pull-label:
    if: contains(github.event.pull_request.labels.*.name, 'git-lfs-pull')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read
    
    steps:
      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            Warning - LFS bandwidth usage
            ⚠️ **Warning**: The label you applied triggers workflows that consume LFS bandwidth and should be used carefully. For safety, this label will be automatically removed once the checks have run.

  add-gsoc-label:
    if: contains(github.event.pull_request.title, '[GSoC]')
    runs-on: ubuntu-latest
    steps:
      - name: Add GSoC label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_TOKEN }}
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['GSoC :sun_with_face:']
            });

  check-first-time-committer:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Welcome first-time contributor
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.BOT_TOKEN }}
          pr-message: |
            👋 Welcome @${{ github.event.pull_request.user.login }}! Thank you for your first contribution to this repository!

            **If you are applying to GSoC, please read our [AI Usage Policy](https://tardis-sn.github.io/summer_of_code/ai_usage_policy/) and our [PR checklist](https://tardis-sn.github.io/summer_of_code/pr_checklist/).**

            Please mark the pull request as draft if you are not ready for review yet or if there are things you will be adding.

  check-orcid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      
      - name: Check if author email exists in orcid.csv
        id: check_orcid
        continue-on-error: true
        run: |
          echo "PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}"
          grep "$(git log $PR_BASE_SHA..HEAD --pretty='%aE' | sort -u)" .orcid.csv
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}

      - name: Find comment
        uses: peter-evans/find-comment@v1
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: Please add your email and ORCID ID
        if: always()

      - name: Create comment
        if: steps.check_orcid.outcome == 'failure'
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.BOT_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.fc.outputs.comment-id }}
          edit-mode: replace
          body: |
            *\*beep\* \*bop\**

            Hi, human.

            I'm the @tardis-bot and I noticed that your email is not associated with an ORCID ID in our database.

            Please add your email and ORCID ID to the `.orcid.csv` file in your current branch and push the changes to this pull request.

            If you don't have an ORCID ID yet, you can create one for free at [orcid.org](https://orcid.org/). ORCID IDs help ensure you get proper credit for your scientific contributions.

            The format should be:
            ```
            email,orcid
            your.email@example.com,0000-0000-0000-0000
            ```

  check-pr-compliance:
    if: contains(github.event.pull_request.title, '[GSoC]')
    runs-on: ubuntu-latest
    steps:
      - name: Check PR and label if non-compliant
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title || '';
            const body = pr.body || '';

            const violations = [];

            // Check 1: PR body must contain the three required template sections
            const requiredSections = [
              { emoji: '📝', heading: 'Description', pattern: /:pencil:|📝/ },
              { emoji: '🚦', heading: 'Testing',     pattern: /:vertical_traffic_light:|🚦/ },
              { emoji: '☑️', heading: 'Checklist',   pattern: /:ballot_box_with_check:|☑️/ },
            ];

            const missingSections = requiredSections.filter(
              s => !s.pattern.test(body)
            );

            if (missingSections.length > 0) {
              const missing = missingSections.map(s => `${s.emoji} ${s.heading}`).join(', ');
              violations.push(
                `PR body is missing required template sections: **${missing}**. ` +
                'Please use the [PR template](https://github.com/tardis-sn/.github/blob/main/.github/pull_request_template.md).'
              );
            }

            // Check 2: If title contains "GSoC", body must mention AI/LLM usage
            if (/gsoc/i.test(title)) {
              const mentionsAI = /\bAI\b|LLM/i.test(body);
              if (!mentionsAI) {
                violations.push(
                  'GSoC PRs must include a statement about AI/LLM usage in the PR body. ' +
                  'Please mention whether you used AI or LLM tools and how, per our ' +
                  '[AI Usage Policy](https://tardis-sn.github.io/summer_of_code/ai_usage_policy/).'
                );
              }
            }

            const label = 'auto-close-pending';

            if (violations.length > 0) {
              // Add the label
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: [label]
              });

              // Post a warning comment
              const message = [
                `**This PR does not follow the contribution guidelines:**`,
                '',
                ...violations.map(v => `- ${v}`),
                '',
                'Please fix these issues within **48 hours** or this PR will be automatically closed.',
                '',
                'If you fix the issues, the label will be removed automatically.'
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: message
              });
            } else {
              // PR is compliant - remove the label if it exists
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: label
                });
              } catch (e) {
                // Label wasn't present, that's fine
              }
            }
