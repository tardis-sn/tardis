name: publish-docs

on:
  workflow_run:
    workflows: [docs]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  publish:
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.repository.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      DEPLOY_BRANCH: gh-pages
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
      PR_SHA: ${{ github.event.workflow_run.head_sha }}
      RUN_ID: ${{ github.event.workflow_run.id }}
    steps:
      - name: Check whether documentation build was requested
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          draft=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq '.draft')
          has_label=false
          has_docs_changes=false

          if gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/labels" --paginate --jq '.[].name' | grep -Fxq build-docs; then
            has_label=true
          fi

          if gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename' | grep -q '^docs/'; then
            has_docs_changes=true
          fi

          if [[ "$draft" == "false" && ( "$has_label" == "true" || "$has_docs_changes" == "true" ) ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download documentation artifact
        if: github.event.workflow_run.conclusion == 'success' && steps.context.outputs.should_publish == 'true'
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          repository: ${{ github.repository }}
          name: docs-build-${{ env.PR_SHA }}
          path: docs-artifact

      - name: Deploy documentation
        if: github.event.workflow_run.conclusion == 'success' && steps.context.outputs.should_publish == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.BOT_TOKEN }}
          publish_branch: ${{ env.DEPLOY_BRANCH }}
          publish_dir: docs-artifact
          destination_dir: pull/${{ env.PR_NUMBER }}
          keep_files: true
          force_orphan: false
          user_name: "TARDIS Bot"
          user_email: "tardis.sn.bot@gmail.com"

      - name: Find comment
        if: steps.context.outputs.should_publish == 'true'
        uses: peter-evans/find-comment@v4
        id: fc
        with:
          issue-number: ${{ env.PR_NUMBER }}
          body-includes: Hi, human.

      - name: Post comment (success)
        if: github.event.workflow_run.conclusion == 'success' && steps.context.outputs.should_publish == 'true'
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.BOT_TOKEN }}
          issue-number: ${{ env.PR_NUMBER }}
          comment-id: ${{ steps.fc.outputs.comment-id }}
          edit-mode: replace
          body: |
            *\*beep\* \*bop\**

            Hi, human.

            The **docs** workflow has **succeeded** :heavy_check_mark:

            [**Click here**](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pull/${{ env.PR_NUMBER }}/index.html) to see your results.

      - name: Post comment (failure)
        if: github.event.workflow_run.conclusion != 'success' && steps.context.outputs.should_publish == 'true'
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.BOT_TOKEN }}
          issue-number: ${{ env.PR_NUMBER }}
          comment-id: ${{ steps.fc.outputs.comment-id }}
          edit-mode: replace
          body: |
            *\*beep\* \*bop\**

            Hi, human.

            The **docs** workflow has **failed** :x:

            [**Click here**](https://github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/actions/runs/${{ env.RUN_ID }}?check_suite_focus=true) to see the build log.
